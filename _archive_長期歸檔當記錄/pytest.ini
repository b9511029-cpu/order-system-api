# 李品緯(JasonLee)

[pytest]
testpaths = tests
pythonpath = .


# 用途說明:
# pytest.ini 的作用其實很關鍵，幫 pytest「補齊它原本不知道的專案規則」。
# pytest.ini = 告訴 pytest「你要在哪裡找測試 + Python 要從哪裡開始找模組」

# testpaths = tests
作用:告訴 pytest：「測試檔案都在 tests 這個資料夾」

沒寫會怎樣？ pytest 會：
1.在整個專案亂掃
2.或以 cwd 當 root
3.有時甚至找不到測試

② pythonpath = .
這個是你現在卡住的核心

作用: 告訴 pytest：
「把目前資料夾（API作品）加入 Python import 搜尋路徑」